services:
  # Python実行環境
  python-app:
    image: python:3.11-slim
    volumes:
      - ./../zkong-app:/app
    working_dir: /app
    tty: true
    command:
      - sh
      - -c
      - |
        apt-get update && apt-get install -y wget procps
        pip install --upgrade pip
        pip install -r requirements.txt
        tail -f /dev/null
    env_file:
      - .env